<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - MyRestaurant</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .dashboard-container {
            padding: 100px 20px;
            max-width: 1000px;
            margin: auto;
        }
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .order-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid #ff5722;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .order-card h3 {
            margin-bottom: 5px;
            color: #ff5722;
        }
        .order-card p {
            margin: 5px 0;
            font-size: 14px;
        }
        .order-time {
            font-size: 12px;
            color: #888;
        }
        #loginBox {
            text-align: center;
            padding: 40px;
            background: #111;
            border-radius: 12px;
            border: 1px solid #333;
        }
        input {
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
        }
        button {
            padding: 12px 24px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div id="loginBox">
            <h2>Owner Login</h2>
            <input type="password" id="ownerPassword" placeholder="Enter Password">
            <br>
            <button onclick="checkPassword()">Login</button>
        </div>
    </div>

    <header class="navbar">
        <div class="logo">MyRestaurant - Dashboard</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
        </nav>
    </header>

    <div class="dashboard-container">
        <h1>Latest Orders</h1>
        <div id="ordersList">
            <p>Loading orders...</p>
        </div>
    </div>

    <!-- Notification sound -->
    <!-- Notification sound (Cash register / Bell) -->
    <audio id="orderSound" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c352739343.mp3" preload="auto"></audio>

    <script>
        const socket = io();
        const CORRECT_PASSWORD = "admin"; // You can change this

        function checkPassword() {
            const pwd = document.getElementById('ownerPassword').value;
            if (pwd === CORRECT_PASSWORD) {
                document.getElementById('loginOverlay').style.display = 'none';
                
                // Prime the audio to bypass autoplay restrictions
                const sound = document.getElementById('orderSound');
                sound.play().then(() => {
                    sound.pause();
                    sound.currentTime = 0;
                }).catch(e => console.log("Audio priming failed:", e));

                fetchOrders();
            } else {
                alert("Incorrect Password!");
            }
        }

        async function fetchOrders() {
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                const list = document.getElementById('ordersList');
                list.innerHTML = '';
                orders.forEach(order => addOrderToUI(order));
            } catch (err) {
                console.error(err);
            }
        }

        function addOrderToUI(order) {
            const list = document.getElementById('ordersList');
            const placeholder = list.querySelector('p');
            if (placeholder) placeholder.remove();

            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <h3>Order from ${order.phoneNumber}</h3>
                <p><strong>Items:</strong> ${order.items.join(', ')}</p>
                <p><strong>Total:</strong> ₹${order.totalPrice}</p>
                <p class="order-time">${new Date(order.createdAt).toLocaleString()}</p>
            `;
            list.prepend(card);
        }

        socket.on('new-order', (order) => {
            console.log("New order received:", order);
            addOrderToUI(order);
            const sound = document.getElementById('orderSound');
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.error("Playback failed:", e));
            }
        });
    </script>
</body>
</html>
