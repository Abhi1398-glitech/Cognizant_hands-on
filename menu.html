<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - MyRestaurant</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .menu-container {
            padding: 100px 20px;
            max-width: 800px;
            margin: auto;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .menu-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }
        .menu-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }
        .menu-item h3 {
            margin-bottom: 10px;
        }
        .menu-item p {
            color: #ccc;
            margin-bottom: 15px;
        }
        .add-btn {
            background: #ff5722;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .cart-summary {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff5722;
            padding: 15px 30px;
            border-radius: 50px;
            display: none;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .checkout-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
        }
        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">MyRestaurant</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Order Food</a>
            <a href="owner.html">Owner</a>
        </nav>
    </header>

    <div class="menu-container">
        <h1>Our Menu</h1>
        <div class="menu-grid">
            <div class="menu-item" data-name="Classic Burger" data-price="299">
                <h3>Classic Burger</h3>
                <p>₹299</p>
                <button class="add-btn" onclick="addToCart('Classic Burger', 299)">Add to Cart</button>
            </div>
            <div class="menu-item" data-name="Margherita Pizza" data-price="499">
                <h3>Margherita Pizza</h3>
                <p>₹499</p>
                <button class="add-btn" onclick="addToCart('Margherita Pizza', 499)">Add to Cart</button>
            </div>
            <div class="menu-item" data-name="Pasta Alfredo" data-price="349">
                <h3>Pasta Alfredo</h3>
                <p>₹349</p>
                <button class="add-btn" onclick="addToCart('Pasta Alfredo', 349)">Add to Cart</button>
            </div>
            <div class="menu-item" data-name="Chicken Tikka" data-price="399">
                <h3>Chicken Tikka</h3>
                <p>₹399</p>
                <button class="add-btn" onclick="addToCart('Chicken Tikka', 399)">Add to Cart</button>
            </div>
        </div>
    </div>

    <div class="cart-summary" id="cartSummary">
        <span id="cartCount">0 Items</span>
        <button class="add-btn" style="background: white; color: #ff5722;" onclick="showCheckout()">Checkout</button>
    </div>

    <div class="checkout-modal" id="checkoutModal">
        <div class="modal-content">
            <h2>Complete Order</h2>
            <p id="orderList"></p>
            <input type="tel" id="phoneNumber" placeholder="Enter Phone Number" required>
            <button onclick="placeOrder()">Place Order</button>
            <button onclick="hideCheckout()" style="background: transparent; margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push(name);
            total += price;
            updateCartUI();
        }

        function updateCartUI() {
            const summary = document.getElementById('cartSummary');
            const count = document.getElementById('cartCount');
            if (cart.length > 0) {
                summary.style.display = 'flex';
                count.innerText = `${cart.length} Items - ₹${total}`;
            } else {
                summary.style.display = 'none';
            }
        }

        function showCheckout() {
            document.getElementById('checkoutModal').style.display = 'flex';
            document.getElementById('orderList').innerText = cart.join(', ');
        }

        function hideCheckout() {
            document.getElementById('checkoutModal').style.display = 'none';
        }

        async function placeOrder() {
            const phoneNumber = document.getElementById('phoneNumber').value;
            if (!phoneNumber) return alert("Please enter phone number");

            const orderData = {
                items: cart,
                phoneNumber: phoneNumber,
                totalPrice: total
            };

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (response.ok) {
                    alert("Order placed successfully!");
                    cart = [];
                    total = 0;
                    updateCartUI();
                    hideCheckout();
                } else {
                    alert("Failed to place order.");
                }
            } catch (err) {
                console.error(err);
                alert("Error connecting to server.");
            }
        }
    </script>
</body>
</html>
